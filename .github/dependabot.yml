version: 2
updates:
  - package-ecosystem: "bundler"
    directories:
      - "**/*"
    target-branch: "main"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      bundler-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      bundler-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "cargo"
