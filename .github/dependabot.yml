version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      github-actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directories:
      - "**/*"
    target-branch: "main"
    schedule:
      interval: "daily"
    versioning-strategy: increase
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
      default-days: 7
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directories:
      - "**/*"
    target-branch: "main"
    schedule:
      interval: "daily"
    versioning-strategy: increase
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
      default-days: 7
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
